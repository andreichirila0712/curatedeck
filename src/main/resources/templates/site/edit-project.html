<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:theme="${theme}">
<div th:replace="~{layout/header}"></div>
<body>
<nav>
    <vaadin-horizontal-layout theme="spacing padding" style="align-items: center; width: 100%; box-sizing: border-box;">
        <vaadin-avatar th:img="${avatar}"></vaadin-avatar>
        <b th:text="'Welcome, ' + ${name}"></b>
        <div style="flex-grow: 1;"></div>
        <div id="particular-content" hx-swap-oob="true">
            <vaadin-tabs>
                <vaadin-tab>Editing</vaadin-tab>
                <vaadin-tab><a href="/api/user/projects">Projects</a></vaadin-tab>
            </vaadin-tabs>
        </div>
    </vaadin-horizontal-layout>
</nav>
<main id="main-content" th:fragment="edit-project-content">
    <vaadin-card theme="outlined">
        <style>
            vaadin-card {
                width: 100%;
                box-sizing: border-box;
            }
        </style>
        <div slot="title">Edit project</div>
        <vaadin-radio-group label="Visibility" theme="horizontal">
            <vaadin-radio-button
                    hx-vals='{"visibility": true}'
                    name="visibility"
                    th:checked="${visibility == 'public'}"
                    th:hx-patch="${visibilityUrl}"
                    hx-trigger="change"
                    label="Public"
                    th:hx-headers="'{&quot;X-CSRF-TOKEN&quot;:&quot;' + ${_csrf.token} + '&quot;}'"
            ></vaadin-radio-button>
            <vaadin-radio-button
                    hx-vals='{"visibility": false}'
                    name="visibility"
                    th:checked="${visibility == 'private'}"
                    th:hx-patch="${visibilityUrl}"
                    hx-trigger="change"
                    label="Private"
                    th:hx-headers="'{&quot;X-CSRF-TOKEN&quot;:&quot;' + ${_csrf.token} + '&quot;}'"
            ></vaadin-radio-button>
        </vaadin-radio-group>
        <form id="update-project-form"
              th:hx-put="${updateUrl}"
              _="on htmx:before:request
                       add @disabled to #update-project-btn
                       remove @hidden from #progress

                     on htmx:after:request
                       remove @disabled from #update-project-btn
                       add @hidden to #progress

                       if event.detail.ctx.response.status == 200
                         add @opened to #update-project-success
                         call me.reset()
                         put '' into #response
                       end"
              hx-target-400="#response"
              hx-swap="beforeend"
        >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <vaadin-form-layout style="width: 100%">
                <vaadin-form-row>
                    <vaadin-text-field style="width: 100%;"
                                       label="Role"
                                       name="role"
                                       th:value="${project.getRole()}"
                    ></vaadin-text-field>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-field style="width: 100%;"
                                       label="Title"
                                       name="title"
                                       th:value="${project.getTitle()}"
                    ></vaadin-text-field>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-area style="width: 100%;"
                                      label="Challenge"
                                      name="challenge"
                                      clear-button-visible
                                      th:value="${project.getDescription().getChallenge()}"
                    ></vaadin-text-area>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-area style="width: 100%;"
                                      label="Solution"
                                      name="solution"
                                      clear-button-visible
                                      th:value="${project.getDescription().getSolution()}"
                    ></vaadin-text-area>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-area style="width: 100%;"
                                      label="Result"
                                      name="result"
                                      clear-button-visible
                                      th:value="${project.getDescription().getResult()}"
                    ></vaadin-text-area>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-field label="Technologies"
                                       name="technologies"
                                       maxlength="156"
                                       th:value="${technologies}"
                    ></vaadin-text-field>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-field label="Live URL"
                                       style="width: 100%;"
                                       type="url"
                                       pattern="(?:(?:https?://)?(?:[a-zA-Z0-9\-]+\.)+[a-zA-Z0-9\-]{2,}(?:/\S*)?)?"
                                       name="live"
                                       th:value="${project.getLiveUrl()}"
                    ></vaadin-text-field>
                </vaadin-form-row>
                <vaadin-form-row>
                    <vaadin-text-field label="Repository"
                                       style="width: 100%;"
                                       type="url"
                                       pattern="(?:(?:https?://)?(?:[a-zA-Z0-9\-]+\.)+[a-zA-Z0-9\-]{2,}(?:/\S*)?)?"
                                       name="repository"
                                       th:value="${project.getRepositoryUrl()}"
                    ></vaadin-text-field>
                </vaadin-form-row>
                <vaadin-form-item>
                    <label slot="label">Start date</label>
                    <vcf-month-picker placeholder="Select start date"
                                      clear-button-visible
                                      name="startDate"
                                      th:value="${project.getStartDate()}"
                    >
                    </vcf-month-picker>
                </vaadin-form-item>
                <vaadin-form-item>
                    <label slot="label">End date</label>
                    <vcf-month-picker placeholder="Select end date"
                                      clear-button-visible
                                      name="endDate"
                                      th:value="${project.getEndDate()}"
                    ></vcf-month-picker>
                </vaadin-form-item>
            </vaadin-form-layout>
        </form>

        <vaadin-vertical-layout>
            <label for="upload-thumbnail"
                   style="
                       color: var(--lumo-secondary-text-color);
                       font-weight: 500;
                       font-size: var(--lumo-font-size-s);
                       font-family: var(--lumo-font-family);
                       line-height: 1;
                       padding-inline: calc(var(--lumo-border-radius-m) / 4) 1em;
                       padding-bottom: 0.5em;
                       overflow: hidden;
                       white-space: nowrap;
                       text-overflow: ellipsis;
                       box-sizing: border-box;"
            >Thumbnail</label>
            <vaadin-upload
                    id="upload-thumbnail"
                    th:target="${thumbnailUrl}"
                    upload-format="multipart"
                    accept="image/png, image/jpeg"
                    max-files="1"
                    style="width: 100%;"
            ></vaadin-upload>
            <label for="upload-diagram"
                   style="
                       color: var(--lumo-secondary-text-color);
                       font-weight: 500;
                       font-size: var(--lumo-font-size-s);
                       font-family: var(--lumo-font-family);
                       line-height: 1;
                       padding-inline: calc(var(--lumo-border-radius-m) / 4) 1em;
                       padding-bottom: 0.5em;
                       overflow: hidden;
                       white-space: nowrap;
                       text-overflow: ellipsis;
                       box-sizing: border-box;"
            >Diagram</label>
            <vaadin-upload
                    id="upload-diagram"
                    th:target="${diagramUrl}"
                    upload-format="multipart"
                    accept="image/png, image/jpeg"
                    max-files="1"
                    style="width: 100%;"
            ></vaadin-upload>
            <label for="upload-thumbnail"
                   style="
                       color: var(--lumo-secondary-text-color);
                       font-weight: 500;
                       font-size: var(--lumo-font-size-s);
                       font-family: var(--lumo-font-family);
                       line-height: 1;
                       padding-inline: calc(var(--lumo-border-radius-m) / 4) 1em;
                       padding-bottom: 0.5em;
                       overflow: hidden;
                       white-space: nowrap;
                       text-overflow: ellipsis;
                       box-sizing: border-box;"
            >Demo</label>
            <vaadin-upload
                    id="upload-demo"
                    th:target="${demoUrl}"
                    upload-format="multipart"
                    accept="image/png, image/jpeg"
                    max-files="1"
                    style="width: 100%;"
            ></vaadin-upload>
        </vaadin-vertical-layout>
        <vaadin-horizontal-layout theme="spacing">
            <vaadin-button theme="error"
                           _="on click add @opened to #confirm-delete-dialog"
                           hx-swap="beforeend"
                           hx-target="#response"
                           id="delete-project-btn">
                Delete project
            </vaadin-button>
            <vaadin-button slot="end" theme="primary" id="update-project-btn"
                           th:_="'on click call #update-project-form.requestSubmit()'">Update project
            </vaadin-button>
        </vaadin-horizontal-layout>
        <vaadin-progress-bar indeterminate hidden id="progress"></vaadin-progress-bar>

        <script>
            {
                document.querySelectorAll('vcf-month-picker[name]').forEach(picker => {
                    const name = picker.getAttribute('name');

                    const hidden = document.createElement('input');
                    hidden.setAttribute('type', 'hidden');
                    hidden.setAttribute('name', name);
                    picker.after(hidden);

                    const sync = () => {
                        hidden.value = picker.value ?? '';
                    };

                    picker.addEventListener('value-changed', sync);
                    picker.addEventListener('change', sync);
                });
            }
        </script>
    </vaadin-card>

    <vaadin-notification id="update-project-success" position="bottom-end">
        <script>
            {
                const notification = document.getElementById('update-project-success');
                notification.renderer = function (root) {
                    if (root.firstElementChild) return;

                    const layout = document.createElement('vaadin-horizontal-layout');
                    layout.setAttribute('theme', 'spacing');
                    layout.style.cssText = 'align-items: centre; min-width: 350px;'

                    const icon = document.createElement('vaadin-icon');
                    icon.setAttribute('icon', 'vaadin:check-icon');

                    const text = document.createElement('div');
                    text.textContent = 'Project updated!';

                    layout.appendChild(icon);
                    layout.appendChild(text);
                    root.appendChild(layout);
                };
            }
        </script>
    </vaadin-notification>

    <vaadin-notification id="delete-project-success" position="bottom-end">
        <script>
            {
                const notification = document.getElementById('delete-project-success');
                notification.renderer = function (root) {
                    if (root.firstElementChild) return;

                    const layout = document.createElement('vaadin-horizontal-layout');
                    layout.setAttribute('theme', 'spacing');
                    layout.style.cssText = 'align-items: centre; min-width: 350px;'

                    const icon = document.createElement('vaadin-icon');
                    icon.setAttribute('icon', 'vaadin:check-icon');

                    const text = document.createElement('div');
                    text.textContent = 'Project deleted!';

                    layout.appendChild(icon);
                    layout.appendChild(text);
                    root.appendChild(layout);
                };
            }
        </script>
    </vaadin-notification>

    <vaadin-confirm-dialog id="confirm-delete-dialog"
                           cancel-button-visible
                           confirm-text="Confirm"
                           header="Confirm project deletion"
                           _="on confirm trigger deletion on #delete-action"
    >
        Are you sure you want to delete this project? This action cannot be undone.
    </vaadin-confirm-dialog>

    <form hidden th:hx-delete="${delete}" hx-trigger="deletion" id="delete-action"
          _="on htmx:after:request
               if event.detail.ctx.response.status == 204
                  add @opened to #delete-project-success
                  go to /api/user/projects
                  put '' into #response
               end">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    </form>

    <script th:inline="javascript">
        document.getElementById('title-content').textContent = 'Edit project';

        {
            document.querySelectorAll('vaadin-upload').forEach(upload => {
                upload.addEventListener('upload-request', (e) => {
                    const csrfHeader = /*[[${_csrf.headerName}]]*/'';
                    const csrfToken = /*[[${_csrf.token}]]*/'';
                    e.detail.xhr.setRequestHeader(csrfHeader, csrfToken);
                });
            });
        }

        {
            const dialog = document.querySelector('vaadin-confirm-dialog');
            const deleteButton = document.getElementById('delete-project-btn');
            deleteButton.addEventListener('click', (e) => {
                e.preventDefault();
            });
            dialog.addEventListener('confirm', () => {
                htmx.trigger('#delete-project-btn', 'htmx:trigger');
            });
        }
    </script>

    <div id="response"></div>
</main>
</body>
</html>
