<div th:fragment="all-featured-projects" th:each="project : ${projects}">
    <vaadin-card theme="outlined elevated horizontal cover-media" id="project-card">
        <img th:id="'project-thumbnail-' + ${project.getId()}" slot="media" th:if="${project.getMedia() != null and project.getMedia().getThumbnail() != null}"
             th:hx-get="'/api/project/' + ${project.getId()} + '/media/thumbnail'" hx-trigger="load"
             _="on htmx:afterRequest
                  set my.src to event.detail.xhr.responseText"
             hx-swap="none"/>
        <vaadin-icon slot="media" th:unless="${project.getMedia() != null and project.getMedia().getThumbnail() != null}" icon="vaadin:file-picture"
                     style="background: rgba(0, 0, 0, 0.2);"
        ></vaadin-icon>
        <div slot="title" th:text="${project.getTitle()}"></div>
        <div slot="subtitle" th:text="${project.getRole()}"></div>
        <div slot="header-suffix">
            <vaadin-button th:_="'on click go to /api/project/' + ${project.getId()} + '/view'"><vaadin-icon icon="vaadin:eye"></vaadin-icon>View</vaadin-button>
        </div>
        <div slot="footer">
            <div th:text="${project.getStartDate().getMonth()} + ' ' + ${project.getStartDate().getYear()} +
             ' - ' + ${project.getEndDate().getMonth()} + ' ' + ${project.getEndDate().getYear()}" ></div>
        </div>
        <style>
            ::part(footer) {
                display: flex;
                justify-content: flex-end;
            }
        </style>
    </vaadin-card>
</div>
